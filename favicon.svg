<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- back card, fanned left -->
  <rect x="2" y="5" width="16" height="22" rx="2"
        fill="#1e1008" stroke="#d4a847" stroke-width="1.5"
        transform="rotate(-15, 10, 16)"/>
  <!-- front card, fanned right -->
  <rect x="14" y="5" width="16" height="22" rx="2"
        fill="#2a1505" stroke="#d4a847" stroke-width="1.5"
        transform="rotate(10, 22, 16)"/>
  <!-- sword on front card -->
  <g transform="rotate(10, 22, 16)">
    <!-- blade -->
    <line x1="22" y1="9" x2="22" y2="20" stroke="#d4a847" stroke-width="2" stroke-linecap="round"/>
    <!-- crossguard -->
    <line x1="18.5" y1="14" x2="25.5" y2="14" stroke="#d4a847" stroke-width="1.8" stroke-linecap="round"/>
    <!-- pommel -->
    <circle cx="22" cy="21.5" r="1.3" fill="#d4a847"/>
  </g>
</svg>
